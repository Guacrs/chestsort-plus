# ===============================
# Chestsort+ Plugin Configuration
# ===============================

config:
  # current plugin version, do not change this
  version: ${version}

settings:
  # sorting is on by default for all players; they can opt out via /chestsort
  default-enabled: true

categories:
  - combat
  - tools_and_utilities
  - food_and_drinks
  - ingredients
  - spawn_eggs
  - building_blocks
  - colored_blocks
  - natural_blocks
  - functional_blocks
  - redstone_blocks
  - op_blocks
